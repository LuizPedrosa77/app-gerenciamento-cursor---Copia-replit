version: "3.8"

services:

  frontend:
    image: hubnexusai/gpfx-frontend:latest
    networks:
      - digital_network
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.gpfx.rule=Host(`fx.hubnexusai.com`)
        - traefik.http.routers.gpfx.entrypoints=websecure
        - traefik.http.services.gpfx.loadbalancer.server.port=80
        - traefik.http.routers.gpfx.service=gpfx
        - traefik.http.routers.gpfx.tls.certresolver=le
        - com.centurylinklabs.watchtower.enable=true

  backend:
    image: hubnexusai/gpfx-backend:latest
    networks:
      - digital_network
      - traefik_public
    environment:
      - DATABASE_URL=postgresql://postgres:hub123nexusai@postgres:5432/saas_gerenciamento_fx
      - SECRET_KEY=gpfx-secret-key-2026-production
      - INTERNAL_API_KEY=gpfx-internal-key-2026
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINIO_ENDPOINT=minio.hubnexusai.com
      - MINIO_ACCESS_KEY=574184765162
      - MINIO_SECRET_KEY=8332bdeca11c80fe91685492
      - REDIS_URL=redis://redis:6379/5
      - N8N_WEBHOOK_URL=https://n8n.hubnexusai.com/webhook
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.gpfx-api.rule=Host(`api.hubnexusai.com`)
        - traefik.http.routers.gpfx-api.entrypoints=websecure
        - traefik.http.services.gpfx-api.loadbalancer.server.port=8000
        - traefik.http.routers.gpfx-api.service=gpfx-api
        - traefik.http.routers.gpfx-api.tls.certresolver=le
        - com.centurylinklabs.watchtower.enable=true

  minio:
    image: minio/minio:latest
    volumes:
      - gpfx-minio-data:/data
    networks:
      - digital_network
    environment:
      - MINIO_ROOT_USER=hubnexusai
      - MINIO_ROOT_PASSWORD=hub123nexusai
    command: server /data --console-address ":9001"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  gpfx-minio-data:
    name: gpfx-minio-data

networks:
  digital_network:
    external: true
    name: digital_network
  traefik_public:
    external: true
    name: traefik_public